<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HR 員工入職綜合登記表</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; }
        fieldset { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        legend { font-weight: bold; font-size: 1.2em; padding: 0 10px; }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        label { width: 150px; flex-shrink: 0; }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], input[type="url"], input[type="number"], select {
            flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
        }
        .checkbox-group, .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .full-width { width: 100%; margin-top: 20px; text-align: center; }
        input[type="submit"] { background: #007bff; color: white; border: none; padding: 10px 30px; border-radius: 4px; cursor: pointer; }
        input[type="reset"] { background: #6c757d; color: white; border: none; padding: 10px 30px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>HR 員工資料蒐集系統 (完整 Input 演示)</h2>
    <p>本表單涵蓋了 HTML5 所有的 input 種類，模擬員工入職流程。</p>

    <form action="/submit-form" method="post" enctype="multipart/form-data">
        
        <!-- 基本文字輸入 -->
        <fieldset>
            <legend>個人基本資料</legend>
            <div class="form-group">
                <label for="full-name">姓名 (text):</label>
                <input type="text" id="full-name" name="full-name" placeholder="請輸入中文全名" required>
            </div>
            <div class="form-group">
                <label for="emp-pwd">系統密碼 (password):</label>
                <input type="password" id="emp-pwd" name="emp-pwd" required>
            </div>
            <div class="form-group">
                <label>性別 (radio):</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> 男</label>
                    <label><input type="radio" name="gender" value="female"> 女</label>
                    <label><input type="radio" name="gender" value="other"> 其他</label>
                </div>
            </div>
        </fieldset>

        <!-- 聯絡與數位身分 -->
        <fieldset>
            <legend>聯絡資訊</legend>
            <div class="form-group">
                <label for="email">電子信箱 (email):</label>
                <input type="email" id="email" name="email" placeholder="example@hr.com">
            </div>
            <div class="form-group">
                <label for="phone">聯絡電話 (tel):</label>
                <input type="tel" id="phone" name="phone" placeholder="0912-345-678">
            </div>
            <div class="form-group">
                <label for="portfolio">作品集網址 (url):</label>
                <input type="url" id="portfolio" name="portfolio">
            </div>
        </fieldset>

        <!-- 數字與時間 -->
        <fieldset>
            <legend>任職細節</legend>
            <div class="form-group">
                <label for="age">期望薪資 (number):</label>
                <input type="number" id="salary" name="salary" min="28000" max="200000" step="500">
            </div>
            <div class="form-group">
                <label for="start-date">到職日期 (date):</label>
                <input type="date" id="start-date" name="start-date">
            </div>
            <div class="form-group">
                <label for="interview-time">面試時間 (datetime-local):</label>
                <input type="datetime-local" id="interview-time" name="interview-time">
            </div>
            <div class="form-group">
                <label for="birth-month">出生月份 (month):</label>
                <input type="month" id="birth-month" name="birth-month">
            </div>
            <div class="form-group">
                <label for="work-week">入職週次 (week):</label>
                <input type="week" id="work-week" name="work-week">
            </div>
            <div class="form-group">
                <label for="clock-in">預計打卡時間 (time):</label>
                <input type="time" id="clock-in" name="clock-in">
            </div>
        </fieldset>

        <!-- 檔案與多媒體 -->
        <fieldset>
            <legend>檔案與特殊設定</legend>
            <div class="form-group">
                <label for="resume">上傳簡歷 (file):</label>
                <input type="file" id="resume" name="resume">
            </div>
            <div class="form-group">
                <label for="fav-color">識別證顏色 (color):</label>
                <input type="color" id="fav-color" name="fav-color" value="#007bff">
            </div>
            <div class="form-group">
                <label for="skill-level">技能熟練度 (range):</label>
                <span>0</span>
                <input type="range" id="skill-level" name="skill-level" min="0" max="100">
                <span>100</span>
            </div>
            <div class="form-group">
                <label for="search-tags">快速搜尋標籤 (search):</label>
                <input type="search" id="search-tags" name="search-tags" placeholder="輸入關鍵字...">
            </div>
        </fieldset>

        <!-- 選項與隱藏欄位 -->
        <fieldset>
            <legend>其他意願</legend>
            <div class="form-group">
                <label>具備證照 (checkbox):</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="certs" value="lang"> 語言證照</label>
                    <label><input type="checkbox" name="certs" value="tech"> 技術證照</label>
                    <label><input type="checkbox" name="certs" value="mgmt"> 管理證照</label>
                </div>
            </div>
            <!-- 隱藏欄位 (hidden) -->
            <input type="hidden" name="form-id" value="HR-INTERNAL-2024">
        </fieldset>

        <!-- 按鈕 -->
        <div class="full-width">
            <input type="image" src="https://placeholder.com" alt="圖片提交" title="這是 input type='image'">
            <br><br>
            <input type="submit" value="正式提交 (submit)">
            <input type="reset" value="重新填寫 (reset)">
            <input type="button" value="一般按鈕 (button)" onclick="alert('你按了普通按鈕')">
        </div>

    </form>

</body>
</html>
